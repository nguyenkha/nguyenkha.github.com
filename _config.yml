# General Jekyll Config
highlighter: rouge
url: https://kha.do
title: Kha Do
description: Personal website of Kha Do - web engineering, fintech, blockchain, and travel creator stories.
lang: en
timezone: Asia/Ho_Chi_Minh
author:
  name: Kha Do
  email: me@kha.do
