    stackoverflow: 1317745
    twitter: donguyenkha
    facebook: nguyenkha
    #tumblr: animalygifs
    linkedin: khado
    #gplus: 110552447039675960964
    youtube: khadilungtung
    tiktok: khadilungtung

  # "Hi, I'm _______"
  name: Kha Do
  email: me@kha.do
  tagline: "#webdeveloper #blockchainengineer #photographer #vlogger"

  # Google Analytics key, leave blank to ignore
