---
layout: default
---

<div class="post-header">
  <p class="meta">
    {{ page.date | date: "%B %d, %Y" }}
    <a href="/" aria-label="Back to all posts">
      <i class="home fa-solid fa-house"></i>
    </a>
  </p>
  <h1 class="title">{{ page.title }}</h1>
</div>

<div id="post">
  {{ content }}
</div>

<div id="related">
  <h3>Related Posts</h3>
  <ul class="posts">
    {% for post in site.related_posts limit:3 %}
    <li>
      <span class="post-date">
        <span class="year">{{ post.date | date: "%Y" }}</span><span class="sep">/</span><span class="month">{{ post.date | date: "%m" }}</span>
      </span>
      <a href="{{ post.url }}">{{ post.title }}</a>
    </li>
    {% endfor %}
  </ul>
</div>
