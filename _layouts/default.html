<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ site.themee.name }} - {{ page.title }}{% else %}{{ site.themee.name }}{% endif %}</title>
  <meta name="author" content="{{ site.themee.name }}" />
  <meta name="description" content="{{ page.description | default: page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 }}" />
  <link rel="canonical" href="{{ page.url | replace:'index.html','' | absolute_url }}" />
  {% if page.noindex %}
  <meta name="robots" content="noindex, nofollow" />
  {% endif %}

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" type="text/css">
  
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#3498db">
  <meta name="msapplication-TileColor" content="#da532c">
  <meta name="theme-color" content="#ffffff">

  <link rel="alternate" type="application/rss+xml" title="{{ site.themee.name }}" href="{{site.url}}/atom.xml" />

  <link rel="stylesheet" href="/assets/css/all.css?v={{ site.time | date: '%s' }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <script async src="//pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1460132164768330" crossorigin="anonymous"></script>
  {% seo %}
</head>
<body>
  <div class="container site-grid">
    <aside class="four columns sidebar">
      {% include sidebar.html %}
    </aside>

    <main class="eleven columns content">
      {{ content }}
    </main>

    <div class="outside-footer">
      {% include footer.html %}
    </div>
  </div>

{% include analytics.html %}
</body>
</html>
